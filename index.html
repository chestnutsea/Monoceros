<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linya Huang's Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Linya Huang's Portfolio</h1>
    </header>

    <main>
        <div class="filter-buttons" id="filterButtons">
            <button class="filter-btn active" data-category="all">全部</button>
            <button class="filter-btn" data-category="孩子们">孩子们</button>
            <button class="filter-btn" data-category="在欧洲">在欧洲</button>
            <button class="filter-btn" data-category="在中国">在中国</button>
        </div>
        <div class="gallery" id="gallery">
            <!-- 图片将通过 JavaScript 动态加载 -->
        </div>
    </main>

    <!-- 图片放大模态框 -->
    <div class="modal" id="modal">
        <span class="close" id="closeModal">&times;</span>
        <button class="nav-arrow nav-arrow-left" id="prevBtn"></button>
        <button class="nav-arrow nav-arrow-right" id="nextBtn"></button>
        <img class="modal-content" id="modalImage" src="" alt="">
    </div>

    <footer>
        <p><a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">蜀ICP备2026010464号-1</a></p>
    </footer>

    <script src="images-config.js"></script>
    <script src="script.js"></script>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
